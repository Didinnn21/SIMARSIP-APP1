<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pengajuan</title>

    <!-- Framework7 CSS CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7@7/framework7-bundle.min.css">

    <style>
        body {
            background: #f1f4f9;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; /* Font nyaman dan modern */
        }

        .page-header {
            background: #0a73ff;
            color: white;
            padding: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tabs-container {
            display: flex;
            gap: 8px;
            padding: 10px;
            overflow-x: auto;
        }

        .tab-btn {
            padding: 6px 14px;
            border-radius: 20px;
            background: #e5e5e5;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s ease;
        }

        .tab-btn.active {
            background: #0a73ff;
            color: #fff;
        }

        .card-item {
            background: white;
            padding: 15px;
            margin: 12px;
            border-radius: 12px;
            box-shadow: 0 3px 5px rgba(0,0,0,0.1);
            border-left: 5px solid #0a73ff;
        }

        .status {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            float: right;
            margin-top: -5px;
        }

        .disetujui { background: #c9f7cd; color: #1f8b2e; }
        .menunggu { background: #ffe8a3; color: #a17400; }
        .ditolak { background: #ffd0d0; color: #b00000; }
    </style>
</head>

<body>

    <div class="page-header">
        <span onclick="history.back()" style="cursor:pointer;">⬅</span>
        Riwayat Lengkap
    </div>

    <!-- TAB -->
    <div class="tabs-container">
        <div class="tab-btn active" data-filter="all">Semua</div>
        <div class="tab-btn" data-filter="approved">Disetujui</div>
        <div class="tab-btn" data-filter="pending">Menunggu</div>
        <div class="tab-btn" data-filter="rejected">Ditolak</div>
    </div>

    <!-- LIST RIWAYAT -->
    <div id="riwayat-list">
        <!-- Data akan dirender di sini secara dinamis -->
    </div>

    <!-- Framework7 JS -->
    <script src="https://cdn.jsdelivr.net/npm/framework7@7/framework7-bundle.min.js"></script>

    <script>
        // ====== DATA DUMMY (DITAMBAHKAN LEBIH BANYAK) ======
        const dummyRiwayat = [
            {
                title: "Peminjaman Ruangan - Lab Komputer",
                date: "10/06/2025 - 15:00–17:00",
                desc: "Kegiatan: Workshop Pemrograman",
                status: "approved"
            },
            {
                title: "Peminjaman Peralatan - Proyektor",
                date: "10/06/2025 - 2 hari",
                desc: "Barang: Proyektor Epson (1 unit)",
                status: "pending"
            },
            {
                title: "Surat Dispensasi - Acara Kampus",
                date: "09/06/2025",
                desc: "Alasan: Mengikuti Lomba Hackathon",
                status: "approved"
            },
            {
                title: "Peminjaman Ruangan - Aula",
                date: "08/06/2025 - 09:00–12:00",
                desc: "Kegiatan: Seminar Kewirausahaan",
                status: "rejected"
            },
            {
                title: "Peminjaman Peralatan - Laptop",
                date: "07/06/2025 - 1 hari",
                desc: "Barang: Laptop Dell (2 unit)",
                status: "approved"
            },
            {
                title: "Surat Izin - Kegiatan Eksternal",
                date: "06/06/2025",
                desc: "Alasan: Kunjungan Industri",
                status: "pending"
            },
            {
                title: "Peminjaman Ruangan - Ruang Rapat",
                date: "05/06/2025 - 10:00–14:00",
                desc: "Kegiatan: Diskusi Kelompok",
                status: "rejected"
            },
            {
                title: "Peminjaman Peralatan - Mikrofon",
                date: "04/06/2025 - 3 hari",
                desc: "Barang: Mikrofon Wireless (1 set)",
                status: "approved"
            }
        ];

        // ========= FUNGSI RENDER LIST ==========
        function renderList(filter = "all") {
            const listContainer = document.getElementById("riwayat-list");
            listContainer.innerHTML = ""; // Kosongkan list

            // Filter data berdasarkan status
            const filteredData = dummyRiwayat.filter(item => {
                if (filter === "all") return true;
                return item.status === filter;
            });

            // Render setiap item
            filteredData.forEach(item => {
                let statusClass = "";
                let statusText = "";
                let borderColor = "#0a73ff"; // Default biru

                if (item.status === "approved") {
                    statusClass = "disetujui";
                    statusText = "DISETUJUI";
                } else if (item.status === "pending") {
                    statusClass = "menunggu";
                    statusText = "MENUNGGU";
                    borderColor = "#ffcc00"; // Kuning untuk pending
                } else if (item.status === "rejected") {
                    statusClass = "ditolak";
                    statusText = "DITOLAK";
                    borderColor = "#ff4444"; // Merah untuk rejected
                }

                const cardHTML = `
                    <div class="card-item" style="border-left-color: ${borderColor};">
                        <div>
                            <strong>${item.title}</strong>
                            <span class="status ${statusClass}">${statusText}</span>
                        </div>
                        <div style="font-size:13px; margin-top:5px;">${item.date}</div>
                        <div style="font-size:13px; margin-top:8px; color:#444;">${item.desc}</div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // ========= EVENT LISTENER UNTUK TABS ==========
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // Hapus active dari semua tab
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                // Tambahkan active ke tab yang diklik
                this.classList.add('active');
                // Ambil filter dari data-attribute
                const filter = this.getAttribute('data-filter');
                // Render ulang list
                renderList(filter);
            });
        });

        // ========= LOAD PERTAMA ==========
        renderList(); // Render semua data saat pertama kali load
    </script>

</body>
</html>
